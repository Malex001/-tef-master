<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>TEF Master</title>
<meta name="theme-color" content="#1e3a5f" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icons/icon-192.png" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<header class="topbar">
  <h1>TEF Master</h1>
  <button id="theme-toggle" aria-label="Basculer le mode sombre">🌙</button>
</header>

<main id="view-review" class="view active">
  <div class="controls">
    <select id="theme-filter" aria-label="Filtrer par thème">
      <option value="">Tous les thèmes</option>
    </select>
    <div class="session-progress"><span id="session-count">0/0</span></div>
  </div>

  <div id="card-area">
    <div class="flashcard" id="flashcard" role="button" tabindex="0" aria-label="Retourner la carte">
      <div class="card-inner">
        <div class="card-face card-front">
          <p class="pos" id="card-pos"></p>
          <p class="word-fr" id="card-fr"></p>
          <p class="hint">Touchez pour retourner</p>
        </div>
        <div class="card-face card-back">
          <p class="word-en" id="card-en"></p>
          <p class="example-fr" id="card-example-fr"></p>
          <p class="example-en" id="card-example-en"></p>
        </div>
      </div>
    </div>
  </div>

  <div class="answer-buttons" id="answer-buttons" hidden>
    <button id="btn-unknown" class="btn btn-unknown">Je ne savais pas</button>
    <button id="btn-known" class="btn btn-known">Je savais</button>
  </div>

  <p id="empty-state" class="empty-state" hidden>
    Aucune carte à réviser pour l'instant. Reviens plus tard ou choisis un autre thème.
  </p>
</main>

<main id="view-stats" class="view">
  <h2>Statistiques</h2>
  <div id="stats-summary" class="stats-summary"></div>
  <div id="stats-themes" class="stats-themes"></div>
</main>

<nav class="tabbar">
  <button class="tab-btn active" data-view="view-review">📇 Réviser</button>
  <button class="tab-btn" data-view="view-stats">📊 Stats</button>
</nav>

<script type="module" src="js/app.js"></script>
</body>
</html>
